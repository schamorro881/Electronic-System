<tui-root tuiTheme="dark">
  <div class="app-bg">
    <video
      #bgVideo
      class="bg-video"
      autoplay
      loop
      muted
      playsinline
      preload="auto"
      src="/assets/animations/shader-recording.webm"
      (canplay)="onVideoReady(bgVideo)">
    </video>
  </div>

  <div class="layout-container">
    <!-- Mobile App Header / Hamburger -->
    <div class="mobile-topbar glass">
       <button class="hamburger-btn" (click)="layoutService.toggleMobileMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="18" y2="18"/></svg>
       </button>
       <span class="mobile-title text-gradient">Electronic System</span>
    </div>

    <app-sidebar></app-sidebar>

    <div class="main-wrapper">
      <main class="content">
        <router-outlet></router-outlet>
      </main>

      <footer class="footer tui-space_top-10">
        <p>&copy; 2026 Electronic System - Gestión de Componentes</p>
      </footer>
    </div>
  </div>
</tui-root>
